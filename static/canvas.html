<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build Watch Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/hub.css" />
</head>
<body>
  <header class="hub-header">
    <div class="hub-logo">Build <em>Hub</em></div>
    <span class="pill" id="livePill"><span class="dot"></span> Live</span>
    <span class="pill" id="grokPill" style="display:none">Grok</span>
    <span class="hub-project" id="projectName">Connecting…</span>
    <div class="hub-actions">
      <button type="button" id="btnDiff">What changed</button>
      <button type="button" id="btnCmd">⌘K Commands</button>
      <button type="button" id="btnLegacy">Classic</button>
    </div>
  </header>

  <div class="hub-timeline">
    <span class="timeline-label">Evolution</span>
    <div class="timeline-track" id="timelineTrack"></div>
    <div class="presence">
      <span class="presence-avatar">VG</span>
      <span class="presence-count">1 live</span>
    </div>
  </div>

  <div class="hub-main">
    <aside class="hub-palette">
      <div class="panel-title">Grok wrappers</div>
      <div class="palette-section" id="wrapperPalette"></div>
      <div class="panel-title">Templates</div>
      <div class="palette-section" id="templatePalette"></div>
      <div class="panel-title">Build stream</div>
      <div class="stream-mini" id="streamMini"></div>
    </aside>

    <div class="hub-workspace-wrap" id="viewWorkspace">
      <div class="workspace-toolbar">
        <button type="button" data-view="workspace" class="active">Workspace</button>
        <button type="button" data-view="read">Read</button>
        <button type="button" data-view="split">Code ↔ Visual</button>
        <button type="button" data-view="devices">Devices</button>
      </div>
      <svg id="edgeSvg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1"></svg>
      <div class="workspace-nodes" id="nodeLayer"></div>
      <div class="minimap" aria-hidden="true"></div>
      <div class="zoom-controls">
        <button type="button" id="btnZoomIn" title="Zoom in">+</button>
        <button type="button" id="btnZoomOut" title="Zoom out">−</button>
      </div>
      <div class="suggestion-tip" id="suggestionTip"></div>

      <div class="view-layer" id="viewRead">
        <div class="read-scroll"><div id="readInner"></div></div>
      </div>
      <div class="view-layer" id="viewSplit">
        <div class="split-view">
          <div class="split-editor">
            <div class="panel-title" style="padding:10px 14px">
              <input id="splitPath" placeholder="path/to/file.tsx" style="width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:var(--mono);font-size:11px" />
            </div>
            <textarea id="splitEditor" spellcheck="false"></textarea>
          </div>
          <div class="split-preview">
            <div class="panel-title">Live preview · tether</div>
            <iframe id="splitFrame" title="Split preview"></iframe>
          </div>
        </div>
      </div>
      <div class="view-layer" id="viewDevices">
        <div class="device-row">
          <div class="device-frame web">
            <div class="label">Web</div>
            <iframe id="devWeb" title="Web preview"></iframe>
          </div>
          <div class="device-frame ios">
            <div class="label">iOS</div>
            <iframe id="devIos" title="iOS preview"></iframe>
          </div>
          <div class="device-frame android">
            <div class="label">Android</div>
            <iframe id="devAndroid" title="Android preview"></iframe>
          </div>
        </div>
      </div>
    </div>

    <aside class="hub-inspector">
      <div class="panel-title">Inspector</div>
      <div id="inspectorBody">
        <div class="inspector-empty">Select a node on the canvas</div>
      </div>
      <div class="panel-title">Artifacts</div>
      <div class="artifact-list" id="artifactList"></div>
    </aside>

    <div class="diff-drawer" id="diffDrawer">
      <div class="diff-summary" id="diffSummary">AI diff summary</div>
      <div class="diff-inner">
        <pre class="diff-pane" id="diffLeft">// before</pre>
        <pre class="diff-pane" id="diffRight">// after</pre>
      </div>
    </div>

    <footer class="hub-dock">
      <div class="dock-head">
        <button type="button" class="active" id="btnTermMirror">Mirror</button>
        <button type="button" id="btnTermShell">PTY shell</button>
        <select id="termPick" title="Terminal file"></select>
        <label style="font-size:0.65rem;color:var(--muted);display:flex;align-items:center;gap:4px;margin-left:auto">
          <input type="checkbox" id="autoSync" checked /> Auto-sync
        </label>
        <span class="dock-cmd-echo" id="cmdEcho">$ build-watch hub</span>
      </div>
      <pre id="termOutput">Terminal — Grok Build output syncs here…</pre>
      <div class="dock-input">
        <input type="text" id="dockInput" placeholder="Shell input (PTY mode)…" autocomplete="off" />
      </div>
    </footer>
  </div>

  <div class="cmd-palette" id="cmdPalette">
    <div class="cmd-box">
      <input type="text" id="cmdInput" placeholder="Ask the hub — Extract hook, connect Grok, open preview…" autocomplete="off" />
      <div class="cmd-results" id="cmdResults"></div>
    </div>
  </div>

  <div class="code-bubble" id="codeBubble">
    <div class="code-bubble-head">
      <span id="codeBubbleTitle">Code</span>
      <button type="button" id="codeBubbleClose">✕</button>
    </div>
    <pre id="codeBubbleBody"></pre>
  </div>

  <script src="/assets/hub.js"></script>
</body>
</html>
