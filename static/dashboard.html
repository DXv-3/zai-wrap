<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>build-watch</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --amber: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    header .meta { color: var(--muted); font-size: 12px; }
    .live { color: var(--green); }
    .live::before { content: "● "; animation: pulse 1.5s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      min-height: calc(100vh - 52px);
    }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }
    section.full { grid-column: 1 / -1; }
    section h2 {
      margin: 0;
      padding: 8px 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .body { padding: 10px 12px; overflow: auto; flex: 1; max-height: 420px; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }
    .term {
      border-bottom: 1px solid var(--border);
      padding: 8px 0;
    }
    .term:last-child { border-bottom: none; }
    .term-head { color: var(--accent); margin-bottom: 4px; }
    .running { color: var(--amber); }
    .event {
      padding: 6px 0;
      border-bottom: 1 solid var(--border);
    }
    .event time { color: var(--muted); font-size: 11px; }
    .kind {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: #21262d;
      color: var(--muted);
      font-size: 10px;
      margin-right: 6px;
    }
    .git-line { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>build-watch</h1>
    <span class="meta live" id="status">connecting…</span>
    <span class="meta" id="project"></span>
  </header>
  <main>
    <section class="full">
      <h2>Build events</h2>
      <div class="body" id="events"></div>
    </section>
    <section>
      <h2>Terminals (Grok / agents)</h2>
      <div class="body" id="terminals"></div>
    </section>
    <section>
      <h2>Git</h2>
      <div class="body" id="git"></div>
    </section>
  </main>
  <script>
    const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    async function tick() {
      try {
        const r = await fetch("/api/state");
        const d = await r.json();
        document.getElementById("status").textContent = "live · " + new Date(d.ts).toLocaleTimeString();
        document.getElementById("project").textContent = d.project_name + " · " + d.project;
        const ev = document.getElementById("events");
        ev.innerHTML = (d.events || []).slice().reverse().map(e => `
          <div class="event">
            <span class="kind">${esc(e.kind)}</span>
            <time>${esc(e.ts)}</time> ${esc(e.msg)}
            ${e.files ? `<div class="git-line">${esc(e.files.join(", "))}</div>` : ""}
          </div>`).join("") || "<span class='meta'>No events yet — run: build-watch event \"started\"</span>";
        const tm = document.getElementById("terminals");
        tm.innerHTML = (d.terminals || []).map(t => `
          <div class="term">
            <div class="term-head ${t.running ? "running" : ""}">#${esc(t.id)} ${t.running ? "(running)" : "exit " + esc(t.exit_code)}</div>
            <div class="git-line">${esc(t.cwd)}</div>
            <div class="git-line">$ ${esc(t.command)}</div>
            <pre>${esc(t.output_tail)}</pre>
          </div>`).join("") || "<span class='meta'>No Grok terminals found under ~/.grok/projects</span>";
        const g = document.getElementById("git");
        if (!d.git || !d.git.enabled) {
          g.innerHTML = "<span class='meta'>Not a git repo</span>";
        } else {
          g.innerHTML = `<div><strong>${esc(d.git.branch)}</strong> · ${d.git.changed_count} changed</div>
            <pre class="git-line">${esc((d.git.status_lines || []).join("\n"))}</pre>
            <pre>${esc(d.git.diff_stat || "")}</pre>`;
        }
      } catch (e) {
        document.getElementById("status").textContent = "offline";
      }
    }
    tick();
    setInterval(tick, 1500);
  </script>
</body>
</html>
